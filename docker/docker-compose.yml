services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env.example
    depends_on:
      - postgres
      - redis
    volumes:
      - ../app:/app/app

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    env_file: .env.example
    depends_on:
      - postgres
      - redis

  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: ["celery", "-A", "app.config.celery", "beat", "--loglevel=info"]
    env_file: .env.example
    depends_on:
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: traderflow
      POSTGRES_USER: traderflow_app
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_replica:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: traderflow
      POSTGRES_USER: traderflow_app
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:

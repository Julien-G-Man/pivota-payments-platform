name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: pivota_test
          POSTGRES_USER: pivota_app
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check . && ruff format --check .

      - name: Type check (mypy)
        run: mypy app/ --strict

      - name: Test
        run: pytest tests/ -v --cov=app --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://pivota_app:testpassword@localhost:5432/pivota_test
          DATABASE_REPLICA_URL: postgresql+asyncpg://pivota_app:testpassword@localhost:5432/pivota_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: development

      - name: Coverage gate
        run: coverage report --fail-under=85
